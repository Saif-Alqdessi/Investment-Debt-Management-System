name: Daily Maturity Alerts

on:
  schedule:
    # Every day at 08:00 AM UTC (11:00 AM Riyadh / AST)
    - cron: '0 8 * * *'
  # Allow manual trigger from GitHub Actions UI for testing
  workflow_dispatch:

jobs:
  send-alerts:
    name: Trigger Maturity Alert Emails
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Call Cron Alert Endpoint
        run: |
          HTTP_STATUS=$(curl \
            --silent \
            --output /tmp/response.json \
            --write-out "%{http_code}" \
            --max-time 60 \
            --request GET \
            --header "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
            --header "Content-Type: application/json" \
            "https://rareb-investments.netlify.app/api/cron/alerts")

          echo "HTTP Status: $HTTP_STATUS"
          echo "Response body:"
          cat /tmp/response.json

          # Fail the workflow if HTTP status is not 200
          if [ "$HTTP_STATUS" -ne 200 ]; then
            echo "❌ Cron job failed with status $HTTP_STATUS"
            exit 1
          fi

          echo "✅ Cron job completed successfully"
